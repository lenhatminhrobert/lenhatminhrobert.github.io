<!DOCTYPE html>
<html lang="en">
<head>
<title>Home page</title>
 <link rel="icon" type="image/x-icon" href="Title.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
}

/* Style the header */
.header {
  padding: 20px;
  text-align: center;
}

/* Style the top navigation bar */
.topnav {
  overflow: hidden;
  background-color: #333;
}

/* Style the topnav links */
.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

/* Change color on hover */
.topnav a:hover {
  background-color: #ddd;
  color: black;
}

/* Create two unequal columns that floats next to each other */
.column {
  float: left;
  padding: 10px;
}
.column.main{
 width: 50%;
}

.column.side{
 width: 50%;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other */
@media screen and (max-width: 800px) {
  .column.main, .column.side {
    width: 100%;
  }
}

/* Style the footer */
.footer {
  background-color: #f1f1f1;
  padding: 10px;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>Header</h1>
  <p>Resize the browser window to see the responsive effect.</p>
</div>

<div class="topnav">
  <a href="home.html">Home</a>
<a href="DC Character Designs.html">DC</a>
  <a href="Marvel Character Designs.html">Marvel</a>

</div>

<div class="row">
  
  
  <div class="column main">
<h2> <img src="Batman (Bruce Wayne).png" alt="Batman"  style="width:300px;height:30px;"></h2>
	<iframe src="D web.html" height="400" width="100%" title="Iframe Example">	</iframe>
  </div>
  
  <div class="column side">
	<h2> <img src="Batman (Bruce Wayne).png" alt="Batman"  style="width:300px;height:30px;"></h2>
	<iframe src="M web.html" height="400" width="100%" title="Iframe Example">	</iframe>
  </div>
</div>

<div class="footer">
  <p>Footer</p>
</div>
  
</body>
</html>
